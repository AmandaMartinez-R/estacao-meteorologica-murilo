{% extends 'base.html' %}

{% block content %}
<h1>Histórico de Leituras</h1>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Temperatura</th>
        <th>Umidade</th>
        <th>Data</th>
        <th>Ações</th>
    </tr>

    {% for l in leituras %}
    <tr>
        <td>{{ l.id }}</td>
        <td>{{ l.temperatura }}</td>
        <td>{{ l.umidade }}</td>
        <td>{{ l.timestamp }}</td>  
        <td>
            <a href="/leituras/{{ l.id }}">Editar</a>
            <button onclick="deletar('{{ l.id }}')">Excluir</button>
        </td>
    </tr>
    {% endfor %}
</table>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% endblock %}
